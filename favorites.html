<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorites - JBL Headphones Collection</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css">
  <link rel="icon" type="img/favicon.png" sizes="32x32" href="img/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://via.placeholder.com/180x180/FF8C00/000000?text=JBL">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="favorites.css">
</head>
<body>
  <header class="header" id="header">
    <nav class="nav container">
      <a href="index.html" class="logo">
        <i class="ri-volume-fill"></i>
        JBL
      </a>

      <ul class="nav__list" id="nav-menu">
        <li><a href="index.html" class="nav__link">Home</a></li>
        <li><a href="about.html" class="nav__link">About</a></li>
        <li><a href="favorites.html" class="nav__link active-link">Favorites</a></li>
        <li><a href="models.html" class="nav__link">Models</a></li>
      </ul>

      <button class="nav__toggle" id="nav-toggle" aria-label="Toggle menu">
        <i class="ri-menu-line"></i>
      </button>
    </nav>
  </header>

  <main class="main">
    <section class="favorite section" id="favorite" data-aos="fade-up">
      <h2 class="section__title">Choose Your Favorite</h2>

      <div class="favorite__stage container">
        <div class="swiper favorite-swiper">
          <div class="swiper-wrapper">
            <article class="swiper-slide favorite__model" data-label="Blue Model">
              <img src="img/favorite-4.png" alt="Blue model" class="favorite__img">
              <span class="favorite__chip">Blue Model</span>
            </article>

            <article class="swiper-slide favorite__model" data-label="Black Model">
              <img src="img/favorite-1.png" alt="Black model" class="favorite__img">
              <span class="favorite__dot"></span>
              <span class="favorite__chip">Black Model</span>
            </article>

            <article class="swiper-slide favorite__model" data-label="White Model">
              <img src="img/favorite-2.png" alt="White model" class="favorite__img">
              <span class="favorite__chip">White Model</span>
            </article>

            <article class="swiper-slide favorite__model" data-label="Red Model">
              <img src="img/favorite-3.png" alt="Red model" class="favorite__img">
              <span class="favorite__chip">Red Model</span>
            </article>
          </div>

          <div class="swiper-button-prev favorite-swiper-button-prev"></div>
          <div class="swiper-button-next favorite-swiper-button-next"></div>
          <div class="swiper-pagination favorite-swiper-pagination"></div>
        </div>
      </div>
    </section>
  </main>

  <section class="site-extras">
    <div class="site-extras__inner container">
      <div class="site-extras__brands">
        <div class="site-extras__brands-track">
          <img src="img/sponsor-1.png" alt="Apple">
          <img src="img/sponsor-2.png" alt="Spotify">
          <img src="img/sponsor-3.png" alt="Amazon">
          <img src="img/sponsor-4.png" alt="YouTube">
          <img src="img/sponsor-1.png" alt="" aria-hidden="true">
          <img src="img/sponsor-2.png" alt="" aria-hidden="true">
          <img src="img/sponsor-3.png" alt="" aria-hidden="true">
          <img src="img/sponsor-4.png" alt="" aria-hidden="true">
        </div>
        <a href="favorites.html" class="site-pill-button site-extras__brands-cta">
          <span>Buy Now</span>
          <i class="ri-arrow-right-circle-fill"></i>
        </a>
      </div>

      <div class="site-extras__grid">
        <a href="index.html" class="site-extras__logo">JBL</a>

        <div class="site-extras__links">
          <h3>Navigation</h3>
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="favorites.html">Favorites</a>
          <a href="models.html">Models</a>
        </div>

        <div class="site-extras__links">
          <h3>Support</h3>
          <a href="about.html">Product Help</a>
          <a href="about.html">Register</a>
          <a href="about.html">Updates</a>
          <a href="about.html">Provides</a>
        </div>

        <div class="site-extras__newsletter">
          <form class="site-extras__form">
            <input type="email" placeholder="Email" aria-label="Email">
            <button type="submit">Subscribe <i class="ri-send-plane-fill"></i></button>
          </form>

          <div class="site-extras__socials">
            <a href="#" aria-label="Instagram"><i class="ri-instagram-fill"></i></a>
            <a href="#" aria-label="Facebook"><i class="ri-facebook-circle-fill"></i></a>
            <a href="#" aria-label="YouTube"><i class="ri-youtube-fill"></i></a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 JBL Clone. All rights reserved. | Made for web developers</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 800,
      once: true
    });

    const navToggle = document.getElementById('nav-toggle');
    const navMenu = document.getElementById('nav-menu');

    navToggle?.addEventListener('click', () => {
      navMenu.classList.toggle('show-menu');
    });

    new Swiper('.favorite-swiper', {
      effect: 'coverflow',
      grabCursor: true,
      centeredSlides: true,
      loop: true,
      slidesPerView: 3,
      initialSlide: 1,
      slideToClickedSlide: true,
      watchSlidesProgress: true,
      coverflowEffect: {
        rotate: 0,
        stretch: 0,
        depth: 120,
        modifier: 1,
        scale: 0.82,
        slideShadows: false
      },
      navigation: {
        nextEl: '.favorite-swiper-button-next',
        prevEl: '.favorite-swiper-button-prev'
      },
      pagination: {
        el: '.favorite-swiper-pagination',
        clickable: true
      },
      on: {
        init(swiper) {
          swiper.slideToLoop(1, 0, false);
        }
      },
      breakpoints: {
        0: {
          slidesPerView: 1.2,
          spaceBetween: 10,
          coverflowEffect: {
            rotate: 0,
            stretch: 0,
            depth: 60,
            modifier: 1,
            scale: 0.9,
            slideShadows: false
          }
        },
        768: {
          slidesPerView: 3,
          spaceBetween: 0,
          coverflowEffect: {
            rotate: 0,
            stretch: 0,
            depth: 120,
            modifier: 1,
            scale: 0.82,
            slideShadows: false
          }
        }
      }
    });
  </script>
</body>
</html>
